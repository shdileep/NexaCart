# Render Blueprint configuration to deploy NexaCart frontend and backend
# For details, see: https://render.com/docs/blueprints

services:
  # 1. NexaCart Backend Web Service
  - type: web
    name: nexacart-backend
    runtime: node
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: nexacart-db
          property: connectionString
      - key: DB_SSL
        value: "true"
      - key: JWT_SECRET
        generateValue: true
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false

  # 2. NexaCart Frontend Static Site
  - type: static
    name: nexacart-frontend
    runtime: static
    plan: free
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_URL
        sync: false # User will input their backend URL (e.g., https://nexacart-backend.onrender.com/api)

databases:
  - name: nexacart-db
    plan: free
